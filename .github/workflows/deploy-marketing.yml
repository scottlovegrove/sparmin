name: Deploy website

# Builds apps/marketing and publishes it to GitHub Pages. Only marketing changes
# trigger it — the watch app has nothing to do with the site.
on:
    push:
        branches: [main]
        paths:
            - 'apps/marketing/**'
            - 'package.json'
            - 'package-lock.json'
            - '.github/workflows/deploy-marketing.yml'
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

# Let a running deploy finish rather than cancelling it mid-publish.
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
            - run: npm ci
            - run: npm run build:marketing
            - uses: actions/configure-pages@v5
            - uses: actions/upload-pages-artifact@v3
              with:
                  path: apps/marketing/dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
